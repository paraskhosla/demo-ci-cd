name: Simple CI-CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build app
        run: dotnet build

      - name: Run tests
        run: dotnet test

      - name: Publish app
        run: dotnet publish -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-app
          path: ./publish

  deploy:   # correct place (inside jobs)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-app

      - name: Debug files
        run: ls -R

      - name: Run app
        run: dotnet DemoApp.dll